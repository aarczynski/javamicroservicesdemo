spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password: password
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    locations: db/migration/h2
  cloud:
    openfeign:
      client:
        config:
          job-offers:
            url: http://localhost:9999