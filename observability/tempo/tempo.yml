server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks

ingester:
  trace_idle_period: 30s
  flush_check_period: 10s
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h # 7 days, 7d causes parse error
