services:
  app-job-offers:
    container_name: app-job-offers
    build:
      context: ./app-job-offers
      dockerfile: docker/Dockerfile
    command: [ "java",
               "-Xdebug", "-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=*:5006",
               "-javaagent:./opentelemetry-javaagent.jar",
               "-jar", "./app-job-offers.jar" ]
    environment:
      OTEL_SERVICE_NAME: "app-job-offers"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_METRIC_EXPORT_INTERVAL: "1000"
      OTEL_INSTRUMENTATION_SPRING_BOOT_ACTUATOR_AUTOCONFIGURE_ENABLED: true
      OTEL_INSTRUMENTATION_MICROMETER_ENABLED: true
      OTEL_INSTRUMENTATION_COMMON_EXPERIMENTAL_CONTROLLER_TELEMETRY_ENABLED: true
    ports:
      - "8080:8080"
      - "5006:5006"
    depends_on:
      postgres-job-offers:
        condition: service_healthy
      otel-collector:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.00"

  app-candidates:
    container_name: app-candidates
    build:
      context: ./app-candidates
      dockerfile: docker/Dockerfile
    command: [ "java",
               "-Xdebug", "-Xrunjdwp:transport=dt_socket,server=y,suspend=n,address=*:5007",
               "-javaagent:./opentelemetry-javaagent.jar",
               "-jar", "./app-candidates.jar" ]
    environment:
      OTEL_SERVICE_NAME: "app-candidates"
      OTEL_EXPORTER_OTLP_PROTOCOL: "grpc"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
      OTEL_METRIC_EXPORT_INTERVAL: "1000"
      OTEL_INSTRUMENTATION_SPRING_BOOT_ACTUATOR_AUTOCONFIGURE_ENABLED: true
      OTEL_INSTRUMENTATION_MICROMETER_ENABLED: true
      OTEL_INSTRUMENTATION_COMMON_EXPERIMENTAL_CONTROLLER_TELEMETRY_ENABLED: true
      JOB_OFFERS_URL: "http://app-job-offers:8080"
    ports:
      - "8081:8080"
      - "5007:5007"
    depends_on:
      postgres-candidates:
        condition: service_healthy
      app-job-offers:
        condition: service_started
      otel-collector:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2.00"

  postgres-job-offers:
    container_name: app-job-offers-db
    image: postgres:18.3
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=app-job-offers-db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.00"

  postgres-candidates:
    container_name: app-candidates-db
    image: postgres:18.3
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=app-candidates-db
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2.00"

  otel-collector:
    container_name: otel-collector
    build:
      context: ./observability/otel-collector
      dockerfile: Dockerfile
    command:
      - --config=/etc/otelcol-contrib/otel-collector.yml
    volumes:
      - ./observability/otel-collector/otel-collector.yml:/etc/otelcol-contrib/otel-collector.yml
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "/http-probe" ]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.11.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    healthcheck:
      test: [ "CMD", "wget", "--spider", "http://localhost:9090" ]
      interval: 5s
      timeout: 3s
      retries: 10

  loki:
    container_name: loki
    build:
      context: ./observability/loki
      dockerfile: Dockerfile
    command:
      - -config.file=/etc/loki/loki.yml
    volumes:
      - ./observability/loki/loki.yml:/etc/loki/loki.yml
    healthcheck:
      test: [ "CMD", "/grpc-health-probe", "-addr=localhost:9095" ]
      interval: 5s
      timeout: 3s
      retries: 10

  tempo:
    container_name: tempo
    build:
      context: ./observability/tempo
      dockerfile: Dockerfile
    command:
      - -config.file=/etc/tempo.yml
    volumes:
      - ./observability/tempo/tempo.yml:/etc/tempo.yml
    healthcheck:
      test: [ "CMD", "/grpc-health-probe", "-addr=localhost:9095" ]
      interval: 5s
      timeout: 3s
      retries: 10

  grafana:
    container_name: grafana
    image: grafana/grafana:12.4.2
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
